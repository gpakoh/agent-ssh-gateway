# Web SSH Gateway — Nginx configuration for LXC 100
# Place in: /etc/nginx/sites-available/ssh.xloud.ru
# Enable: ln -s /etc/nginx/sites-available/ssh.xloud.ru /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name ssh.xloud.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ssh.xloud.ru;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/xloud.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xloud.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xloud.ru/chain.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Authelia authentication (one_factor - только пароль, без 2FA)
    include /etc/nginx/snippets/authelia-authrequest.conf;

    # WebSocket support + long timeouts for SSH sessions
    proxy_http_version 1.1;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass http://10.10.10.145:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # WebSocket endpoint specific (ensure proper handling)
    location /api/ssh/execute/stream {
        proxy_pass http://10.10.10.145:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
