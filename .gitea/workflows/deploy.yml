name: Deploy
on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m pytest tests/ -v --timeout=30

  deploy-nginx:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy nginx config
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER || 'root' }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts

          scp -P $SSH_PORT nginx-ssh.xloud.ru.conf \
            $SSH_USER@$SSH_HOST:/etc/nginx/sites-available/AI-Docker.conf

          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "nginx -t && nginx -s reload"

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend container
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT || '22' }}
          BACKEND_USER: ${{ secrets.BACKEND_USER || 'root' }}
          BACKEND_KEY: ${{ secrets.BACKEND_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$BACKEND_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p $BACKEND_PORT $BACKEND_HOST >> ~/.ssh/known_hosts

          ssh -p $BACKEND_PORT $BACKEND_USER@$BACKEND_HOST '
            cd /srv/ssh-gateway
            git pull
            docker compose build
            docker compose up -d
          '
