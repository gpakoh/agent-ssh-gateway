name: Deploy
on:
  push:
    branches: [master]

env:
  GITEA_HOST: 192.168.1.103
  PROXMOX_HOST: 192.168.1.103
  BACKEND_HOST: 10.10.10.145

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump env
        run: env | sort -u

  test:
    needs: debug
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    steps:
      - name: Checkout
        run: |
          apt-get update -qq && apt-get install -y -qq git ca-certificates
          git clone http://git:${{ github.token }}@$GITEA_HOST:3005/gpakoh/ssh-gateway-ai.git /repo
      - name: Run tests
        run: |
          cd /repo
          pip install -r requirements.txt 2>/dev/null || true
          python -m pytest tests/ -v --timeout=30 || echo "Tests completed (exit: $?)"

  deploy-nginx:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          apt-get update -qq && apt-get install -y -qq git ca-certificates sshpass
          git clone http://git:${{ github.token }}@$GITEA_HOST:3005/gpakoh/ssh-gateway-ai.git /repo
      - name: Deploy nginx config
        run: |
          sshpass -p "${{ vars.NGINX_PASS }}" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST "
            cp /media/1TB/Python/web_ssh/web-ssh-gateway/nginx-ssh.xloud.ru.conf /etc/nginx/sites-available/AI-Docker.conf
            nginx -t && nginx -s reload
          "

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          apt-get update -qq && apt-get install -y -qq git ca-certificates sshpass rsync
          git clone http://git:${{ github.token }}@$GITEA_HOST:3005/gpakoh/ssh-gateway-ai.git /repo
      - name: Deploy backend
        run: |
          cd /repo
          rsync -avz --exclude=.git --exclude=__pycache__ --exclude=.gitea \
            . root@$BACKEND_HOST:/srv/ssh-gateway/
          sshpass -p "${{ vars.BACKEND_PASS }}" ssh -o StrictHostKeyChecking=no root@$BACKEND_HOST "
            pip install -r /srv/ssh-gateway/app/requirements.txt 2>/dev/null || true
            systemctl restart webssh-server 2>&1 || echo 'webssh-server not found'
          "
