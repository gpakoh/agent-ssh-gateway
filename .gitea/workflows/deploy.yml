name: Deploy
on:
  push:
    branches: [master]

env:
  GITEA_HOST: 192.168.1.103
  PROXMOX_HOST: 192.168.1.103
  BACKEND_HOST: 10.10.10.145

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump env
        run: env | sort -u

  test:
    needs: debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          apt-get update -qq
          apt-get install -y -qq python3 python3-venv python3-pip
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-timeout httpx
          python -m pytest tests/ -v --timeout=30

  deploy-nginx:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy nginx config
        run: |
          apt-get update -qq
          apt-get install -y -qq openssh-client sshpass
          sshpass -p "${{ vars.NGINX_PASS }}" scp -o StrictHostKeyChecking=no \
            nginx-ssh.xloud.ru.conf root@$PROXMOX_HOST:/etc/nginx/sites-available/AI-Docker.conf
          sshpass -p "${{ vars.NGINX_PASS }}" ssh -o StrictHostKeyChecking=no root@$PROXMOX_HOST "
            nginx -t && nginx -s reload
          "

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy backend
        run: |
          apt-get update -qq
          apt-get install -y -qq openssh-client sshpass rsync
          sshpass -p "${{ vars.BACKEND_PASS }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude=.git --exclude=__pycache__ --exclude=.gitea \
            ./ root@$BACKEND_HOST:/srv/ssh-gateway/
          sshpass -p "${{ vars.BACKEND_PASS }}" ssh -o StrictHostKeyChecking=no root@$BACKEND_HOST "
            pip install -r /srv/ssh-gateway/requirements.txt
            systemctl restart webssh-server 2>&1 || echo 'webssh-server not found'
          "
