name: Deploy
on:
  push:
    branches: [master]

env:
  GITEA_HOST: 10.0.1.103
  NGINX_HOST: 192.0.2.10
  BACKEND_HOST: 10.0.1.103
  BACKEND_DIR: /media/1TB/Python/web_ssh/web-ssh-gateway

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export PIP_PROGRESS_BAR=off
          apt-get update -qq >/dev/null
          apt-get install -y -qq python3 python3-venv python3-pip >/dev/null
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip >/dev/null
          python -m pip install -q -r requirements.txt pytest pytest-timeout httpx
          python -m pytest tests/ -q --timeout=30

  deploy-nginx:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy nginx config
        run: |
          apt-get update -qq
          apt-get install -y -qq openssh-client
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$NGINX_HOST "
            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
          "
          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            nginx-ssh.xloud.ru.conf root@$NGINX_HOST:/etc/nginx/sites-available/ssh.xloud.ru
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$NGINX_HOST "
            ln -sfn /etc/nginx/sites-available/ssh.xloud.ru /etc/nginx/sites-enabled/ssh.xloud.ru
            nginx -t && nginx -s reload
          "

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy backend
        run: |
          apt-get update -qq
          apt-get install -y -qq openssh-client rsync
          rsync -avz \
            -e "ssh -o BatchMode=yes -o StrictHostKeyChecking=no" \
            --exclude=.git --exclude=__pycache__ --exclude=.gitea \
            ./ root@$BACKEND_HOST:$BACKEND_DIR/
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$BACKEND_HOST "
            cd $BACKEND_DIR
            API_KEY=\$(docker inspect web-ssh-gateway --format '{{range .Config.Env}}{{println .}}{{end}}' | awk -F= '\$1 == \"API_KEY\" {print \$2; exit}')
            test -n \"\$API_KEY\"
            API_KEY=\"\$API_KEY\" docker compose up -d --build
            curl -sf http://127.0.0.1:8085/health
          "
