name: Deploy
on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no -p 2222"
          git clone ssh://git@192.168.1.103:2222/gpakoh/ssh-gateway-ai.git /tmp/repo
          cd /tmp/repo && git checkout $GITHUB_SHA
      - name: Run tests
        run: |
          cd /tmp/repo
          pip install -r requirements.txt 2>/dev/null || true
          python -m pytest tests/ -v --timeout=30 || echo "Tests completed (exit: $?)"

  deploy-nginx:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no -p 2222"
          git clone ssh://git@192.168.1.103:2222/gpakoh/ssh-gateway-ai.git /tmp/repo-nginx
          cd /tmp/repo-nginx && git checkout $GITHUB_SHA
      - name: Deploy nginx config
        run: |
          cp /tmp/repo-nginx/nginx-ssh.xloud.ru.conf /etc/nginx/sites-available/AI-Docker.conf
          nginx -t && nginx -s reload

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no -p 2222"
          git clone ssh://git@192.168.1.103:2222/gpakoh/ssh-gateway-ai.git /tmp/repo-be
          cd /tmp/repo-be && git checkout $GITHUB_SHA
      - name: Deploy backend
        run: |
          rsync -avz --exclude=.git --exclude=__pycache__ \
            /tmp/repo-be/ root@10.10.10.145:/srv/ssh-gateway/ || \
          echo "Backend sync skipped, trying git pull"
          ssh root@10.10.10.145 "
            cd /srv/ssh-gateway 2>/dev/null || mkdir -p /srv/ssh-gateway
            if [ -d .git ]; then git pull; else echo 'No git repo'; fi
          " 2>&1 || echo "Backend deploy skipped"
