name: Deploy
on:
  push:
    branches: [master]

env:
  NGINX_HOST: ${{ vars.NGINX_HOST }}
  BACKEND_HOST: ${{ vars.BACKEND_HOST }}
  BACKEND_DIR: ${{ vars.BACKEND_DIR || '/media/1TB/Python/agent-ssh-gateway' }}
  DOMAIN: ${{ vars.DOMAIN || 'ssh.xloud.ru' }}
  AUTH_DOMAIN: ${{ vars.AUTH_DOMAIN || 'auth.xloud.ru' }}
  GATEWAY_IP: ${{ vars.GATEWAY_IP || '10.0.0.10' }}

jobs:
  test:
    runs-on: lxc100-runner
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('docker/requirements.txt') }}
          restore-keys: pip-
      - name: Run tests
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export PIP_PROGRESS_BAR=off
          apt-get update -qq >/dev/null
          apt-get install -y -qq python3 python3-venv python3-pip >/dev/null
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip >/dev/null
          python -m pip install -q -r docker/requirements.txt pytest pytest-timeout httpx mypy
          echo "::group::mypy type check"
          python -m mypy app/ --no-error-summary || echo "mypy: pre-existing errors (non-blocking)"
          echo "::endgroup::"
          python -m pytest tests/ -q --timeout=30 --ignore=tests/test_mtls_e2e.py

  deploy-nginx:
    needs: test
    runs-on: lxc100-runner
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate deploy host variables
        run: |
          test -n "$NGINX_HOST" || { echo "NGINX_HOST is not set"; exit 1; }
      - name: Deploy nginx config
        shell: bash
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -euo pipefail
          echo "::group::Check API_KEY"
          test -n "${API_KEY:-}" || { echo "API_KEY secret is missing or empty"; exit 1; }
          echo "OK"
          echo "::endgroup::"

          echo "::group::apt-get install"
          apt-get update -qq
          apt-get install -y -qq openssh-client python3 2>&1 | tail -1
          echo "::endgroup::"

          echo "::group::Inject placeholders into nginx template"
          python3 - <<'PY'
          import os, re
          api_key = os.environ["API_KEY"]
          domain = os.environ.get("DOMAIN", "")
          backend_ip = os.environ.get("BACKEND_HOST", "")
          auth_domain = os.environ.get("AUTH_DOMAIN", "")

          if len(api_key) < 16:
              raise SystemExit("API_KEY too short")
          if any(ch in api_key for ch in "\r\n"):
              raise SystemExit("API_KEY must be single-line")
          if not domain:
              raise SystemExit("DOMAIN is not set")
          if not backend_ip:
              raise SystemExit("BACKEND_HOST is not set")

          escaped_key = api_key.replace("\\", "\\\\").replace('"', '\\"')
          text = open("nginx-ssh-gateway.conf").read()

          if "__API_KEY__" not in text:
              raise SystemExit("template missing __API_KEY__")
          if "__DOMAIN__" not in text:
              raise SystemExit("template missing __DOMAIN__")
          if "__BACKEND_IP__" not in text:
              raise SystemExit("template missing __BACKEND_IP__")

          text = text.replace("__API_KEY__", escaped_key)
          text = text.replace("__DOMAIN__", domain)
          text = text.replace("__BACKEND_IP__", backend_ip)
          text = text.replace("__AUTH_DOMAIN__", auth_domain)

          vals = re.findall(r'proxy_set_header\s+X-API-Key\s+"([^"]*)";', text)
          if len(vals) != 4 or any(not v for v in vals):
              raise SystemExit("X-API-Key replacement failed")
          if "__DOMAIN__" in text or "__BACKEND_IP__" in text:
              raise SystemExit("placeholder replacement incomplete")
          open("nginx-ssh-gateway.conf", "w").write(text)
          PY
          echo "OK"
          echo "::endgroup::"

          echo "::group::Copy config to nginx host"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$NGINX_HOST "mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled"
          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            nginx-ssh-gateway.conf root@$NGINX_HOST:/etc/nginx/sites-available/$DOMAIN
          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            scripts/migrate-nginx-ssh-block.py root@$NGINX_HOST:/tmp/
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$NGINX_HOST "DOMAIN=$DOMAIN python3 /tmp/migrate-nginx-ssh-block.py"
          echo "OK"
          echo "::endgroup::"

          echo "::group::Validate and reload nginx"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$NGINX_HOST bash -se <<CFGEOF
            set -euo pipefail
            DOMAIN="${DOMAIN}"
            echo "1/5: link config"
            ln -sfn /etc/nginx/sites-available/\$DOMAIN /etc/nginx/sites-enabled/\$DOMAIN
            echo "2/5: validate"
            python3 - <<'PYEOF'
          from pathlib import Path
          import re, os
          domain = os.environ['DOMAIN']
          text = Path(f'/etc/nginx/sites-enabled/{domain}').read_text()
          vals = re.findall(r'proxy_set_header\s+X-API-Key\s+"([^"]*)";', text)
          assert len(vals) == 4 and all(len(v) >= 16 for v in vals), 'API_KEY check failed'
          assert '__API_KEY__' not in text, 'placeholder still present'
          print('API_KEY OK')
          PYEOF
            echo "3/5: nginx test"
            nginx -t
            echo "4/5: reload"
            nginx -s reload
            echo "5/5: verify endpoint"
            for i in 1 2 3; do
              sleep 1
              code=$(curl -k -sS -o /dev/null -w '%{http_code}' --resolve \$DOMAIN:443:127.0.0.1 https://\$DOMAIN/api/servers || true)
              echo "attempt \$i: \$code"
              test "\$code" = "302" && break
            done
            test "\$code" = "302" || { echo "FAIL: expected 302 got \$code"; exit 1; }
            echo "OK"
            echo "6/6: mTLS checks"
            openssl req -x509 -newkey rsa:2048 -keyout /tmp/mtls-bad.key -out /tmp/mtls-bad.crt -days 1 -nodes -subj '/CN=Bad-Client' 2>/dev/null
            health=\$(curl -k -sS --resolve \$DOMAIN:443:127.0.0.1 https://\$DOMAIN/health || true)
            valid=\$(curl -k -sS -o /dev/null -w '%{http_code}' --resolve \$DOMAIN:443:127.0.0.1 --cert /etc/nginx/certs/client.crt --key /etc/nginx/certs/client.key https://\$DOMAIN/api/servers || true)
            bad=\$(curl -k -sS -o /dev/null -w '%{http_code}' --resolve \$DOMAIN:443:127.0.0.1 --cert /tmp/mtls-bad.crt --key /tmp/mtls-bad.key https://\$DOMAIN/api/servers || true)
            echo "health=\${health} valid=\${valid} bad=\${bad}"
            echo "\${health}" | grep -q '"status":"ok"' || { echo "FAIL: health=\${health}"; exit 1; }
            test "\${valid}" != "302" || { echo "FAIL: valid cert got 302"; exit 1; }
            test "\${bad}" = "400" || { echo "FAIL: invalid cert expected 400 got \${bad}"; exit 1; }
            rm -f /tmp/mtls-bad.key /tmp/mtls-bad.crt
            echo "mTLS OK"
          CFGEOF
          echo "::endgroup::"

  deploy-backend:
    needs: test
    runs-on: lxc100-runner
    container:
      image: node:20-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate deploy host variables
        run: |
          test -n "$BACKEND_HOST" || { echo "BACKEND_HOST is not set"; exit 1; }
      - name: Deploy backend
        shell: bash
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -euo pipefail
          test -n "${API_KEY:-}" || { echo "API_KEY secret is missing or empty"; exit 1; }
          test "${#API_KEY}" -ge 16 || { echo "API_KEY secret is too short"; exit 1; }
          apt-get update -qq
          apt-get install -y -qq openssh-client rsync
          umask 077
          printf 'API_KEY=%s\n' "$API_KEY" > .ci-api-key.env
          printf 'GATEWAY_IP=%s\n' "$GATEWAY_IP" >> .ci-api-key.env
          rsync -avz \
            -e "ssh -o BatchMode=yes -o StrictHostKeyChecking=no" \
            --exclude=.git --exclude=__pycache__ --exclude=.gitea --exclude=.ci-api-key.env \
            ./ root@$BACKEND_HOST:$BACKEND_DIR/
          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            .ci-api-key.env root@$BACKEND_HOST:/tmp/web-ssh-api-key.env
          rm -f .ci-api-key.env
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@$BACKEND_HOST "BACKEND_DIR='$BACKEND_DIR' bash -se" <<'REMOTE'
            set -euo pipefail
            cd "$BACKEND_DIR"
            test -s /tmp/web-ssh-api-key.env
            api_key="$(awk -F= '$1=="API_KEY" {print substr($0, 9); exit}' /tmp/web-ssh-api-key.env)"
            test -n "$api_key"
            docker compose -p agent-ssh-gateway --env-file /tmp/web-ssh-api-key.env -f docker/docker-compose.yml down --remove-orphans
            docker compose -p agent-ssh-gateway --env-file /tmp/web-ssh-api-key.env -f docker/docker-compose.yml up -d --build
            rm -f /tmp/web-ssh-api-key.env
            docker inspect agent-ssh-gateway --format '{{range .Config.Env}}{{println .}}{{end}}' \
              | awk -F= '$1=="API_KEY" {found=1; if (length($2) < 16) exit 42} END {if (!found) exit 43}'
            for i in 1 2 3 4 5; do
              curl -sf http://127.0.0.1:8085/health && break
              echo "health check attempt $i failed, retrying..."
              sleep 2
            done
            curl -sf http://127.0.0.1:8085/health || { echo "backend health check failed after 5 tries"; exit 1; }
            API_KEY="$api_key" python3 - <<'PY'
          import os
          import urllib.error
          import urllib.request

          def status(path, key=None):
              req = urllib.request.Request('http://127.0.0.1:8085' + path)
              if key:
                  req.add_header('X-API-Key', key)
              try:
                  with urllib.request.urlopen(req, timeout=5) as resp:
                      return resp.status
              except urllib.error.HTTPError as exc:
                  return exc.code

          api_key = os.environ.get('API_KEY', '')
          if len(api_key) < 16:
              raise SystemExit('container API_KEY is missing or too short')
          if status('/api/servers') != 401:
              raise SystemExit('unauthenticated backend request must return 401')
          if status('/api/servers', api_key) in (401, 403, 503):
              raise SystemExit('authenticated backend request was rejected')
          PY
          REMOTE
