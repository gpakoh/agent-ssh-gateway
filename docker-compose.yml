version: "3.8"

services:
  web-ssh-gateway:
    build: .
    container_name: web-ssh-gateway
    hostname: ssh-gateway
    networks:
      proxmox_macvlan:
        ipv4_address: 10.10.10.145
      internal_net: {}
    ports:
      - "8085:8085"
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8085
      - SESSION_TIMEOUT=3600
      - CLEANUP_INTERVAL=300
      - CORS_ORIGINS=["https://ssh.xloud.ru"]
      - OPENCODE_ADAPTER_URL=http://172.17.0.1:8008
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - ssh_keys:/app/ssh_keys:ro
      - gateway_logs:/app/logs
      - /tmp:/tmp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxmox_macvlan:
    external: true
  internal_net:
    external: true

volumes:
  ssh_keys:
    driver: local
  gateway_logs:
    driver: local
