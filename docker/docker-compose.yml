name: web-ssh-gateway

services:
  mcp-postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-postgres
    hostname: mcp-postgres
    networks:
      internal_net: {}
    volumes:
      - mcp_postgres_data:/var/lib/postgresql/data
      - ./mcp-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  sshd:
    build:
      context: sshd
      dockerfile: Dockerfile
    container_name: ssh-gateway-sshd
    hostname: sshd
    networks:
      internal_net: {}
    volumes:
      - /media/1TB/Python:/media/1TB/Python:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "sshd", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ssh-gateway-redis
    networks:
      internal_net: {}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web-ssh-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: web-ssh-gateway
    hostname: web-ssh-gateway
    networks:
      proxmox_macvlan:
        ipv4_address: 10.0.0.145
      internal_net: {}
    ports:
      - "8085:8085"
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8085
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=${API_KEY:?set API_KEY}
      - AGENT_TOKEN=${AGENT_TOKEN:?set AGENT_TOKEN}
      - AGENT_TOKEN_SCOPES=["ssh:connect","ssh:execute","ssh:files","ssh:disconnect","ssh:port-check","jobs:read"]
      - SSH_STRICT_HOST_KEY_CHECKING=false
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - AUTH_DB_PATH=/app/data/auth.sqlite3
      - JWT_EXPIRES_MINUTES=${JWT_EXPIRES_MINUTES:-1440}
      - PERSISTENT_SESSIONS_ENABLED=true
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@mcp-postgres:5432/gateway
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?set ENCRYPTION_KEY}
    volumes:
      - ssh_keys:/app/ssh_keys:ro
      - gateway_logs:/app/logs
      - known_hosts:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      mcp-postgres:
        condition: service_healthy

networks:
  proxmox_macvlan:
    external: true
  internal_net:
    external: true

volumes:
  mcp_postgres_data:
    driver: local
  ssh_keys:
    driver: local
  gateway_logs:
    driver: local
  redis_data:
    driver: local
  known_hosts:
    driver: local
