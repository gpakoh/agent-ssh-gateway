services:
  redis:
    image: redis:7-alpine
    container_name: ssh-gateway-redis
    networks:
      - internal_net
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web-ssh-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: web-ssh-gateway
    hostname: web-ssh-gateway
    networks:
      - internal_net
    ports:
      - "8085:8085"
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8085
      - REDIS_URL=redis://redis:6379/0
      - API_KEY=${API_KEY:?set API_KEY}
      - AGENT_TOKEN=1cff760db55a0b6e058317d4259559c78c440e49f64aba78de942182a1fe2e3d
      - AGENT_TOKEN_SCOPES=["ssh:connect","ssh:execute","ssh:files","ssh:disconnect","ssh:port-check"]
      - KNOWN_HOSTS_STORE=file
      - KNOWN_HOSTS_FILE=/tmp/known_hosts
    tmpfs:
      - /tmp
    volumes:
      - ssh_keys:/app/ssh_keys:ro
      - gateway_logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

networks:
  internal_net:
    driver: bridge

volumes:
  ssh_keys:
    driver: local
  gateway_logs:
    driver: local
  redis_data:
    driver: local
