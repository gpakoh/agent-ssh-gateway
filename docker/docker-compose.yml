version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: ssh-gateway-redis
    networks:
      internal_net: {}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  agent-ssh-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agent-ssh-gateway
    hostname: agent-ssh-gateway
    networks:
      proxy_net:
        ipv4_address: ${GATEWAY_IP:-10.0.0.10}
      internal_net: {}
    ports:
      - "8085:8085"
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8085
      - SESSION_TIMEOUT=3600
      - CLEANUP_INTERVAL=300
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://gateway.example.com"]}
      - OPENCODE_ADAPTER_URL=${OPENCODE_ADAPTER_URL:-http://host.docker.internal:8008}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - API_AUTH_ENABLED=${API_AUTH_ENABLED:-true}
      - API_KEY=${API_KEY:?set API_KEY for agent-ssh-gateway}
      - ALLOWED_CLIENT_CIDRS=${ALLOWED_CLIENT_CIDRS:-127.0.0.1/32,192.168.0.0/16,10.0.0.0/8}
      - TRUSTED_PROXY_CIDRS=${TRUSTED_PROXY_CIDRS:-127.0.0.1/32,10.0.0.0/8}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_JOB_QUEUE_ENABLED=true
    volumes:
      - ssh_keys:/app/ssh_keys:ro
      - gateway_logs:/app/logs
      - /tmp:/tmp
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy

networks:
  proxy_net:
    driver: macvlan
    external: true
  internal_net:
    external: true

volumes:
  ssh_keys:
    driver: local
  gateway_logs:
    driver: local
  redis_data:
    driver: local
