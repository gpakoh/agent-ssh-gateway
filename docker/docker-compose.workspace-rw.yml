# docker-compose.workspace-rw.yml — repo-only RW mount for MCP workspace tools
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.workspace-rw.yml up -d
#
# Scope: only the repo directory is switched to :rw.
# Base workspace mount stays read-only. projects.yaml, ssh_keys, read_only unchanged.

name: web-ssh-gateway

services:
  web-ssh-gateway:
    environment:
      - WORKSPACE_READONLY=false
    volumes:
      - ${WORKSPACE_RW_HOST_PATH:-..}:${WORKSPACE_RW_CONTAINER_PATH:-/workspace}:rw
