name: web-ssh-gateway

services:
  gateway-notifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gateway-notifier
    hostname: gateway-notifier
    command: ["python", "-m", "app.notifier"]
    networks:
      internal_net: {}
    environment:
      - GATEWAY_NOTIFIER_ENABLED=${GATEWAY_NOTIFIER_ENABLED:-false}
      - GATEWAY_NOTIFIER_DRY_RUN=${GATEWAY_NOTIFIER_DRY_RUN:-true}
      - GATEWAY_NOTIFIER_GATEWAY_URL=${GATEWAY_NOTIFIER_GATEWAY_URL:-http://web-ssh-gateway:8085}
      - GATEWAY_NOTIFIER_API_KEY=${GATEWAY_NOTIFIER_API_KEY:-}
      - GATEWAY_NOTIFIER_TELEGRAM_TOKEN=${GATEWAY_NOTIFIER_TELEGRAM_TOKEN:-}
      - GATEWAY_NOTIFIER_CHAT_IDS=${GATEWAY_NOTIFIER_CHAT_IDS:-}
      - GATEWAY_NOTIFIER_POLL_INTERVAL_SECONDS=${GATEWAY_NOTIFIER_POLL_INTERVAL_SECONDS:-5}
      - GATEWAY_NOTIFIER_TIMEOUT_SECONDS=${GATEWAY_NOTIFIER_TIMEOUT_SECONDS:-10}
      - GATEWAY_NOTIFIER_PROXY=${GATEWAY_NOTIFIER_PROXY:-}
      - GATEWAY_NOTIFIER_EVENT_TYPES=${GATEWAY_NOTIFIER_EVENT_TYPES:-command.deny,workspace.readonly_block,session.connect,session.disconnect,system.error}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 96M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib, sys; sys.exit(0 if b'app.notifier' in pathlib.Path('/proc/1/cmdline').read_bytes() else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      web-ssh-gateway:
        condition: service_healthy

networks:
  internal_net:
    external: true
